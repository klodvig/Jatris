<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jatris</title>
    <style>
        body {
            background: #1a1a24;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .game-container {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            position: relative;
        }
        .main-board {
            position: relative;
        }
        canvas {
            border: solid 3px #34495e;
            background-color: #0b0b0e;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #2c3e50;
            padding: 20px;
            border-radius: 8px;
            min-width: 120px;
        }
        .ui-box {
            text-align: center;
        }
        .ui-box h2 {
            margin: 0 0 10px 0;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #bdc3c7;
        }
        #score {
            font-size: 2rem;
            font-weight: bold;
            color: #2ecc71;
        }
        /* Game Over Screen Overlay */
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        #game-over-screen h1 {
            color: #e74c3c;
            margin: 0 0 10px 0;
        }
        #game-over-screen button {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            transition: background 0.2s;
        }
        #game-over-screen button:hover {
            background: #27ae60;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="main-board">
            <canvas id="tetris" width="240" height="400"></canvas>
            
            <div id="game-over-screen">
                <h1>GAME OVER</h1>
                <p>Final Score: <span id="final-score">0</span></p>
                <button onclick="resetGame()">Play Again</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="ui-box">
                <h2>Score</h2>
                <div id="score">0</div>
            </div>
            <div class="ui-box">
                <h2>Next</h2>
                <canvas id="next" width="100" height="100"></canvas>
            </div>
        </div>
    </div>

<script>
const canvas = document.getElementById('tetris');
const context = canvas.getContext('2d');
context.scale(20, 20);

const nextCanvas = document.getElementById('next');
const nextContext = nextCanvas.getContext('2d');
nextContext.scale(20, 20);

const arena = createMatrix(12, 20);

const SHAPES = 'ILJOTSZ';
const COLORS = [
    null,
    '#FF0D72', '#0DC2FF', '#0DFF72',
    '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'
];

const player = {
    pos: {x: 0, y: 0},
    matrix: null,
    nextMatrix: null,
    score: 0,
};

let gameOver = false;

function createMatrix(w, h) {
    const matrix = [];
    while (h--) {
        matrix.push(new Array(w).fill(0));
    }
    return matrix;
}

function createPiece(type) {
    if (type === 'T') return [[0, 0, 0], [1, 1, 1], [0, 1, 0]];
    if (type === 'O') return [[2, 2], [2, 2]];
    if (type === 'L') return [[0, 3, 0], [0, 3, 0], [0, 3, 3]];
    if (type === 'J') return [[0, 4, 0], [0, 4, 0], [4, 4, 0]];
    if (type === 'I') return [[0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0]];
    if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
    if (type === 'Z') return [[7, 7, 0], [0, 7, 7], [0, 0, 0]];
}

// Draw Grid Lines helper
function drawGrid(ctx, width, height) {
    ctx.strokeStyle = '#1e1e24';
    ctx.lineWidth = 0.05;
    
    // Vertical lines
    for (let x = 0; x < width; x++) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, height);
        ctx.stroke();
    }
    // Horizontal lines
    for (let y = 0; y < height; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(width, y);
        ctx.stroke();
    }
}

function drawMatrix(ctx, matrix, offset) {
    matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) {
                ctx.fillStyle = COLORS[value];
                ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                
                // Bevel effect on blocks
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.fillRect(x + offset.x, y + offset.y, 1, 0.1);
                ctx.fillRect(x + offset.x, y + offset.y, 0.1, 1);
            }
        });
    });
}

function draw() {
    // Clear main board
    context.fillStyle = '#0b0b0e';
    context.fillRect(0, 0, canvas.width, canvas.height);
    
    drawGrid(context, 12, 20);
    drawMatrix(context, arena, {x: 0, y: 0});
    drawMatrix(context, player.matrix, player.pos);

    // Clear and Draw Next Piece mini-board
    nextContext.fillStyle = '#1c1c24';
    nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
    
    if (player.nextMatrix) {
        // Center the preview piece inside the 5x5 grid
        const nx = (5 - player.nextMatrix[0].length) / 2;
        const ny = (5 - player.nextMatrix.length) / 2;
        drawMatrix(nextContext, player.nextMatrix, {x: nx, y: ny});
    }
}

function merge(arena, player) {
    player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) {
                arena[y + player.pos.y][x + player.pos.x] = value;
            }
        });
    });
}

function collide(arena, player) {
    const [m, o] = [player.matrix, player.pos];
    for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) {
            if (m[y][x] !== 0 &&
               (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                return true;
            }
        }
    }
    return false;
}

function arenaSweep() {
    let rowCount = 1;
    outer: for (let y = arena.length - 1; y > 0; --y) {
        for (let x = 0; x < arena[y].length; ++x) {
            if (arena[y][x] === 0) {
                continue outer;
            }
        }
        const row = arena.splice(y, 1)[0].fill(0);
        arena.unshift(row);
        ++y;

        player.score += rowCount * 10;
        rowCount *= 2;
    }
}

function playerDrop() {
    if (gameOver) return;
    player.pos.y++;
    if (collide(arena, player)) {
        player.pos.y--;
        merge(arena, player);
        playerReset();
        arenaSweep();
        updateScore();
    }
    dropCounter = 0;
}

function playerMove(dir) {
    if (gameOver) return;
    player.pos.x += dir;
    if (collide(arena, player)) {
        player.pos.x -= dir;
    }
}

function getRandomPiece() {
    return createPiece(SHAPES[SHAPES.length * Math.random() | 0]);
}

function playerReset() {
    // If next piece doesn't exist yet, initialize it
    if (!player.nextMatrix) {
        player.nextMatrix = getRandomPiece();
    }

    // Current piece becomes the next piece, then roll a new next piece
    player.matrix = player.nextMatrix;
    player.nextMatrix = getRandomPiece();
    
    player.pos.y = 0;
    player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
    
    // Game Over condition
    if (collide(arena, player)) {
        gameOver = true;
        document.getElementById('final-score').innerText = player.score;
        document.getElementById('game-over-screen').style.display = 'flex';
    }
}

function resetGame() {
    arena.forEach(row => row.fill(0));
    player.score = 0;
    gameOver = false;
    document.getElementById('game-over-screen').style.display = 'none';
    player.nextMatrix = null;
    playerReset();
    updateScore();
}

function rotate(matrix, dir) {
    for (let y = 0; y < matrix.length; ++y) {
        for (let x = 0; x < y; ++x) {
            [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
        }
    }
    if (dir > 0) matrix.forEach(row => row.reverse());
    else matrix.reverse();
}

function playerRotate(dir) {
    if (gameOver) return;
    const pos = player.pos.x;
    let offset = 1;
    rotate(player.matrix, dir);
    while (collide(arena, player)) {
        player.pos.x += offset;
        offset = -(offset + (offset > 0 ? 1 : -1));
        if (offset > player.matrix[0].length) {
            rotate(player.matrix, -dir);
            player.pos.x = pos;
            return;
        }
    }
}

let dropCounter = 0;
let dropInterval = 1000;
let lastTime = 0;

function update(time = 0) {
    const deltaTime = time - lastTime;
    lastTime = time;

    dropCounter += deltaTime;
    if (dropCounter > dropInterval) {
        playerDrop();
    }

    draw();
    requestAnimationFrame(update);
}

function updateScore() {
    document.getElementById('score').innerText = player.score;
}

document.addEventListener('keydown', event => {
    if (event.keyCode === 37) playerMove(-1);        // Left Arrow
    else if (event.keyCode === 39) playerMove(1);     // Right Arrow
    else if (event.keyCode === 40) playerDrop();      // Down Arrow
    else if (event.keyCode === 81) playerRotate(-1);  // Q Key
    else if (event.keyCode === 87) playerRotate(1);   // W Key
});

playerReset();
updateScore();
update();
</script>
</body>
</html>
